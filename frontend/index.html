<!-- ONLY showing modified parts + fully integrated JS (rest unchanged) -->

<!-- ===== CHANGE 1: METRIC LABEL ===== -->
<div class="m-card">
  <div class="m-lbl">Sortino Ratio</div>
  <div class="m-val y" id="m-sh">—</div>
  <div class="m-sub">downside risk adjusted</div>
</div>

<!-- ===== CHANGE 2: TABLE HEADER ===== -->
<thead>
<tr>
  <th>Fund</th>
  <th>Adj Ret</th>
  <th>Raw</th>
  <th>Down Vol</th>
  <th>Sortino</th>
  <th>Wt</th>
</tr>
</thead>

<script>

/* ===== UPDATED renderResult() — FULL FUNCTION ===== */
function renderResult(d){

  updateSignal(d.z_pe,d.z_pb,d.z,d.equity);

  const fmt=v=>(v*100).toFixed(2)+'%';
  const volOk=d.port_vol<=0.101;

  document.getElementById('m-ret').textContent=fmt(d.port_ret);

  const mVol=document.getElementById('m-vol');
  mVol.textContent=fmt(d.port_vol);
  mVol.className='m-val '+(volOk?'g vol-ok':'r vol-breach');

  // ✅ SORTINO INSTEAD OF SHARPE
  document.getElementById('m-sh').textContent=(d.sortino || d.sharpe).toFixed(3);

  const mEq=document.getElementById('m-eq');
  mEq.textContent=fmt(d.equity);
  mEq.className='m-val '+(d.equity>0.70?'g':d.equity<0.60?'r':'y');

  document.getElementById('m-def').textContent=fmt(d.debt+d.gold+d.cash);
  document.getElementById('m-eqv').textContent=fmt(d.eq_vol);

  if(!volOk)showToast(`⚠ Vol ${fmt(d.port_vol)} slightly above cap`);

  const funds=d.fund_names||_funds;
  const fw=d.fund_weights;
  const si=funds.map((_,i)=>i).sort((a,b)=>fw[b]-fw[a]);

  /* ===== EQUITY BARS (UNCHANGED) ===== */
  document.getElementById('fund-alloc').innerHTML=si.map(i=>{
    const pw=fw[i]*d.equity;
    return `<div class="alloc-row">
      <div class="a-name" title="${funds[i]}">${funds[i]}</div>
      <div class="a-bar-wrap"><div class="a-bar" style="width:${Math.min(100,pw/0.15*100)}%;background:${EQ_COLORS[i%EQ_COLORS.length]}"></div></div>
      <div class="a-pct">${(pw*100).toFixed(2)}%</div>
      <div class="a-sh">Sh ${(d.fund_sortinos?.[i] || d.fund_sharpes[i]).toFixed(2)}</div>
    </div>`;
  }).join('');

  /* ===== DEFENSIVE ===== */
  document.getElementById('def-alloc').innerHTML=
    [{name:'Debt',val:d.debt,c:DEF_COLORS[0]},{name:'Gold',val:d.gold,c:DEF_COLORS[1]},{name:'Cash',val:d.cash,c:DEF_COLORS[2]}]
    .map(x=>`<div class="alloc-row">
      <div class="a-name">${x.name}</div>
      <div class="a-bar-wrap"><div class="a-bar" style="width:${Math.min(100,x.val/0.40*100)}%;background:${x.c}"></div></div>
      <div class="a-pct">${(x.val*100).toFixed(2)}%</div>
      <div class="a-sh"></div>
    </div>`).join('');

  /* ===== DONUT (UNCHANGED) ===== */
  if(_donut)_donut.destroy();
  _donut=new Chart(document.getElementById('donut-chart'),{
    type:'doughnut',
    data:{
      labels:[...si.map(i=>funds[i]),'Debt','Gold','Cash'],
      datasets:[{
        data:[
          ...si.map(i=>+(fw[i]*d.equity*100).toFixed(2)),
          +(d.debt*100).toFixed(2),
          +(d.gold*100).toFixed(2),
          +(d.cash*100).toFixed(2)
        ],
        backgroundColor:[...si.map(i=>EQ_COLORS[i%EQ_COLORS.length]),...DEF_COLORS],
        borderColor:'#07080d',
        borderWidth:2
      }]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });

  renderFrontier(d);

  /* ===== FULLY UPGRADED TABLE ===== */
  document.getElementById('fund-tbl').innerHTML=si.map(i=>{

    const flags = d.fund_flags?.[i] || [];

    return `<tr>
      <td>
        <span class="dot" style="background:${EQ_COLORS[i%EQ_COLORS.length]}"></span>
        ${funds[i]}
        ${flags.map(f=>`<span style="color:#fbbf24;font-size:10px">⚠</span>`).join('')}
      </td>

      <td style="color:var(--green)">
        ${(d.fund_returns[i]*100).toFixed(1)}%
      </td>

      <td style="color:var(--muted)">
        ${(d.fund_raw_returns?.[i]*100 || d.fund_returns[i]*100).toFixed(1)}%
      </td>

      <td>
        ${(d.fund_semi_vols?.[i]*100 || d.fund_vols[i]*100).toFixed(1)}%
      </td>

      <td style="color:var(--yellow)">
        ${(d.fund_sortinos?.[i] || d.fund_sharpes[i]).toFixed(2)}
      </td>

      <td style="color:var(--accent);font-weight:500">
        ${(fw[i]*d.equity*100).toFixed(2)}%
      </td>

    </tr>`;
  }).join('');
}

</script>
